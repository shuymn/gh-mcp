name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache: true

      - name: Verify release version bump
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        shell: bash
        run: |
          set -euo pipefail

          current_upstream="$(
            git show "${BASE_SHA:?}:mcp_version.go" |
              sed -nE 's/^const mcpServerVersion = "(v[^"]+)"$/\1/p'
          )"
          next_upstream="$(
            sed -nE 's/^const mcpServerVersion = "(v[^"]+)"$/\1/p' mcp_version.go
          )"
          current_release="$(git show "${BASE_SHA}:VERSION")"
          next_release="$(cat VERSION)"

          go run ./scripts/release-version validate \
            "$current_release" \
            "$next_release" \
            "$current_upstream" \
            "$next_upstream"

      - name: Restore bundled assets cache
        id: bundled-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: bundled/github-mcp-server_*
          key: bundled-assets-${{ hashFiles('bundle_*.go', 'mcp_version.go') }}
          enableCrossOsArchive: true

      - name: Prepare bundled assets
        if: steps.bundled-cache.outputs.cache-hit != 'true'
        run: go run ./scripts/prepare
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify bundled assets
        run: go run ./scripts/prepare -check

      - name: Set golangci-lint version
        id: set-golangci-lint-version
        run: echo "version=$(yq '.vars.GOLANGCI_LINT_VERSION' Taskfile.yml)" >> "$GITHUB_OUTPUT"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: ${{ steps.set-golangci-lint-version.outputs.version }}
          args: --timeout=5m

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    timeout-minutes: 40
    permissions:
      contents: read
      actions: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache: true

      - name: Restore bundled assets cache
        id: bundled-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: bundled/github-mcp-server_*
          key: bundled-assets-${{ hashFiles('bundle_*.go', 'mcp_version.go') }}
          enableCrossOsArchive: true

      - name: Prepare bundled assets
        if: steps.bundled-cache.outputs.cache-hit != 'true'
        run: go run ./scripts/prepare
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify bundled assets
        run: go run ./scripts/prepare -check

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test -race -shuffle=on -count=10 ./...

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: go test -race -coverprofile=coverage.out ./...

      - if: matrix.os == 'ubuntu-latest'
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache: true

      - name: Restore bundled assets cache
        id: bundled-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: bundled/github-mcp-server_*
          key: bundled-assets-${{ hashFiles('bundle_*.go', 'mcp_version.go') }}
          enableCrossOsArchive: true

      - name: Prepare bundled assets
        if: steps.bundled-cache.outputs.cache-hit != 'true'
        run: go run ./scripts/prepare
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify bundled assets
        run: go run ./scripts/prepare -check

      - name: Build binary
        run: go build -o gh-mcp .

      - name: Verify binary artifact
        run: |
          test -f gh-mcp
          test -x gh-mcp

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gh-mcp-linux-amd64
          path: gh-mcp
          retention-days: 7

  release:
    name: Release
    needs: build
    if: >-
      github.event_name == 'push' &&
      github.repository == 'shuymn/gh-mcp' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/release.yml
    with:
      target_sha: ${{ github.sha }}
