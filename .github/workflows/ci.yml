name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read  # Required for octocov to read artifacts
  pull-requests: write  # Required for octocov to comment on PRs

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
    - name: Check if tagpr branch
      id: check-branch
      shell: pwsh
      env:
        BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      run: |
        if ("$env:BRANCH_NAME" -like "tagpr-from-v*") {
          "skip=true" >> $env:GITHUB_OUTPUT
        } else {
          "skip=false" >> $env:GITHUB_OUTPUT
        }

    - name: Checkout code
      if: steps.check-branch.outputs.skip != 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      if: steps.check-branch.outputs.skip != 'true'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: stable
        cache: true

    - name: Restore bundled assets cache
      if: steps.check-branch.outputs.skip != 'true'
      id: bundled-cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: bundled/github-mcp-server_*
        key: bundled-assets-${{ hashFiles('bundle_*.go', 'mcp_version.go') }}
        enableCrossOsArchive: true

    - name: Prepare bundled assets
      if: steps.check-branch.outputs.skip != 'true' && steps.bundled-cache.outputs.cache-hit != 'true'
      run: go run ./scripts/prepare
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Verify bundled assets
      if: steps.check-branch.outputs.skip != 'true'
      run: go run ./scripts/prepare -check

    - name: Set golangci-lint version
      if: steps.check-branch.outputs.skip != 'true'
      id: set-golangci-lint-version
      run: echo "version=$(yq '.vars.GOLANGCI_LINT_VERSION' Taskfile.yml)" >> "$GITHUB_OUTPUT"

    - name: Run golangci-lint
      if: steps.check-branch.outputs.skip != 'true'
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
      with:
        version: ${{ steps.set-golangci-lint-version.outputs.version }}
        args: --timeout=5m

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    timeout-minutes: 40
    permissions:
      contents: read
      actions: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Check if tagpr branch
      id: check-branch
      shell: pwsh
      env:
        BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      run: |
        if ("$env:BRANCH_NAME" -like "tagpr-from-v*") {
          "skip=true" >> $env:GITHUB_OUTPUT
        } else {
          "skip=false" >> $env:GITHUB_OUTPUT
        }

    - name: Checkout code
      if: steps.check-branch.outputs.skip != 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      if: steps.check-branch.outputs.skip != 'true'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: stable
        cache: true

    - name: Restore bundled assets cache
      if: steps.check-branch.outputs.skip != 'true'
      id: bundled-cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: bundled/github-mcp-server_*
        key: bundled-assets-${{ hashFiles('bundle_*.go', 'mcp_version.go') }}
        enableCrossOsArchive: true

    - name: Prepare bundled assets
      if: steps.check-branch.outputs.skip != 'true' && steps.bundled-cache.outputs.cache-hit != 'true'
      run: go run ./scripts/prepare
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Verify bundled assets
      if: steps.check-branch.outputs.skip != 'true'
      run: go run ./scripts/prepare -check

    - name: Download dependencies
      if: steps.check-branch.outputs.skip != 'true'
      run: go mod download

    - name: Verify dependencies
      if: steps.check-branch.outputs.skip != 'true'
      run: go mod verify

    - name: Run tests
      if: steps.check-branch.outputs.skip != 'true'
      run: go test -race -shuffle=on -count=10 ./...

    - name: Run tests with coverage
      if: steps.check-branch.outputs.skip != 'true' && matrix.os == 'ubuntu-latest'
      run: go test -race -coverprofile=coverage.out ./...

    - uses: k1LoW/octocov-action@73d561f65d59e66899ed5c87e4621a913b5d5c20 # v1.5.0
      if: steps.check-branch.outputs.skip != 'true' && matrix.os == 'ubuntu-latest'

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
    - name: Check if tagpr branch
      id: check-branch
      shell: pwsh
      env:
        BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      run: |
        if ("$env:BRANCH_NAME" -like "tagpr-from-v*") {
          "skip=true" >> $env:GITHUB_OUTPUT
        } else {
          "skip=false" >> $env:GITHUB_OUTPUT
        }

    - name: Checkout code
      if: steps.check-branch.outputs.skip != 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Go
      if: steps.check-branch.outputs.skip != 'true'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: stable
        cache: true

    - name: Restore bundled assets cache
      if: steps.check-branch.outputs.skip != 'true'
      id: bundled-cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: bundled/github-mcp-server_*
        key: bundled-assets-${{ hashFiles('bundle_*.go', 'mcp_version.go') }}
        enableCrossOsArchive: true

    - name: Prepare bundled assets
      if: steps.check-branch.outputs.skip != 'true' && steps.bundled-cache.outputs.cache-hit != 'true'
      run: go run ./scripts/prepare
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Verify bundled assets
      if: steps.check-branch.outputs.skip != 'true'
      run: go run ./scripts/prepare -check

    - name: Build binary
      if: steps.check-branch.outputs.skip != 'true'
      run: go build -o gh-mcp .

    - name: Test binary exists and is executable
      if: steps.check-branch.outputs.skip != 'true'
      run: |
        test -f gh-mcp
        test -x gh-mcp
        ./gh-mcp --version || true

    - name: Upload artifact
      if: steps.check-branch.outputs.skip != 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: gh-mcp-linux-amd64
        path: gh-mcp
        retention-days: 7
