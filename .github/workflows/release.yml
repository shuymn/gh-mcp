name: release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare bundled assets
        run: go run ./scripts/prepare
        env:
          GH_TOKEN: ${{ github.token }}

      - id: determine_release_tag
        env:
          GH_PAGER: cat
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -e

          if [[ ${GITHUB_REF} = refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="$(git describe --tags --abbrev=0)"
          fi

          is_draft=$(gh release view "$tag" --json isDraft -q '.isDraft' || echo "false")
          if [[ ${is_draft} != "true" ]]; then
            echo "Release $tag is not a draft or does not exist. Exiting."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: cli/gh-extension-precompile@76961aa3bd1123d0a6fd42d0a41aca0696937c39 # v2.2.0
        with:
          generate_attestations: true
          go_version_file: go.mod
          release_tag: ${{ steps.determine_release_tag.outputs.tag }}

      - name: Publish draft release if exists
        env:
          RELEASE_TAG: ${{ steps.determine_release_tag.outputs.tag }}
          GH_PAGER: cat
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -e

          is_draft=$(gh release view "$RELEASE_TAG" --json isDraft -q '.isDraft' || echo "false")
          if [[ ${is_draft} != "true" ]]; then
            echo "No draft release found"
          else
            gh release edit "$RELEASE_TAG" --draft=false
          fi
