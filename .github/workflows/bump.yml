name: Prepare upstream release

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths: [mcp_version.go]

permissions:
  contents: read

concurrency:
  group: prepare-upstream-release-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    if: >-
      github.event.pull_request.user.login == 'renovate[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'renovate/github-github-mcp-server-')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout trusted base
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout exact Renovate head
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: trusted/go.mod
          cache-dependency-path: trusted/go.sum
          cache: true

      - name: Prepare release metadata
        id: prepare
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        working-directory: candidate
        run: >-
          ../trusted/scripts/workflows/prepare-upstream-release.sh
          prepare "$BASE_SHA" "$HEAD_SHA"

      - name: Create repository-scoped app token
        if: steps.prepare.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Commit generated release metadata
        if: steps.prepare.outputs.changed == 'true'
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_VERSION: ${{ steps.prepare.outputs.release }}
        working-directory: candidate
        run: >-
          ../trusted/scripts/workflows/prepare-upstream-release.sh
          commit "$RELEASE_VERSION" "$HEAD_REF"
